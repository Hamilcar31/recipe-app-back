spring.datasource.url=jdbc:postgresql://localhost:5432/recipedb
spring.datasource.username=recipe_user
spring.datasource.password=recipe_pass
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true

# JWT Configuration (secret should be at least 256 bits for HS256)
jwt.secret=your_super_secret_key_that_must_be_at_least_256_bits_long_for_security_purposes_change_this_in_production
jwt.expiration=86400000